<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEM DB - GitHub Repositories</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ghBg: '#0d1117',
                        ghCard: '#161b22',
                        ghBorder: '#30363d',
                        ghText: '#c9d1d9',
                        ghMuted: '#8b949e',
                        ghBlue: '#58a6ff',
                        ghGreen: '#238636',
                        ghGreenHover: '#2ea043',
                        ghRed: '#f85149'
                    },
                    fontFamily: {
                        sans:['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Helvetica', 'Arial', 'sans-serif'],
                        mono:['ui-monospace', 'SFMono-Regular', 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- MathJax para Equações Complexas do ENEM -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            startup: { typeset: false } // Nós disparamos manualmente após o render
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Custom Scrollbar similar ao GitHub */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 5px;
            border: 2px solid #0d1117;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        /* Animações e UI states */
        .github-radio:checked + div {
            background-color: #1f6feb;
            border-color: #1f6feb;
        }
        
        .show-results .correct-option {
            background-color: rgba(46, 160, 67, 0.1) !important;
            border-color: #2ea043 !important;
        }
        .show-results .correct-option .option-label,
        .show-results .correct-option .option-text {
            color: #3fb950 !important;
            font-weight: 600;
        }
        
        .show-results .wrong-selected {
            background-color: rgba(248, 81, 73, 0.1) !important;
            border-color: #f85149 !important;
        }
        .show-results .wrong-selected .option-label,
        .show-results .wrong-selected .option-text {
            color: #ff7b72 !important;
        }

        .checkbox-custom:checked + div {
            background-color: #1f6feb;
            border-color: #1f6feb;
        }
        .checkbox-custom:checked + div i {
            display: block;
        }

        .terminal-blink::after {
            content: '█';
            animation: blink 1s step-start infinite;
            color: #8b949e;
            margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-ghBg text-ghText font-sans h-screen overflow-hidden flex selection:bg-ghBlue selection:text-white">

    <!-- Overlay Mobile -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/70 z-40 hidden transition-opacity lg:hidden backdrop-blur-sm"></div>

    <!-- Sidebar de Filtros -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-ghCard border-r border-ghBorder flex flex-col transition-transform duration-300 transform -translate-x-full lg:translate-x-0 lg:relative h-full shadow-2xl">
        <div class="p-6 border-b border-ghBorder flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-3 text-ghText">
                    <i class="fa-brands fa-github text-2xl text-white"></i>
                    ENEM <span class="text-ghBlue">DataHub</span>
                </h1>
                <p class="text-[11px] text-ghMuted mt-1.5 font-mono">/datasets/brazilian-exams</p>
            </div>
            <button id="close-sidebar" class="lg:hidden text-ghMuted hover:text-white transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="p-5 flex-1 overflow-y-auto">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-sm font-semibold text-ghText flex items-center gap-2">
                    <i class="fa-solid fa-filter text-ghMuted"></i> Filtros Ativos
                </h2>
                <button id="clear-filters" class="text-xs text-ghBlue hover:underline hidden font-medium">Limpar</button>
            </div>
            
            <div class="mb-7">
                <h3 class="text-[11px] font-bold text-ghMuted uppercase tracking-wider mb-3 font-mono">Ano de Aplicação</h3>
                <div id="filter-years" class="space-y-1">
                    <div class="animate-pulse h-5 bg-ghBorder rounded w-full mb-2"></div>
                </div>
            </div>
            
            <div class="mb-7">
                <h3 class="text-[11px] font-bold text-ghMuted uppercase tracking-wider mb-3 font-mono">Área do Conhecimento</h3>
                <div id="filter-disciplines" class="space-y-1">
                    <div class="animate-pulse h-5 bg-ghBorder rounded w-full mb-2"></div>
                </div>
            </div>
        </div>
        
        <div class="p-4 border-t border-ghBorder bg-[#0d1117]">
            <div class="text-[10px] text-ghMuted font-mono flex items-center justify-center gap-2">
                <i class="fa-solid fa-circle text-ghGreen text-[8px]"></i> Raw GitHub Fetcher Ativo
            </div>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col min-w-0 relative bg-ghBg">
        
        <!-- Header Superior -->
        <header class="h-16 flex items-center px-4 sm:px-6 border-b border-ghBorder bg-ghCard/95 backdrop-blur z-10 shrink-0">
            <button id="menu-toggle" class="lg:hidden text-ghMuted hover:text-white mr-4 transition-colors">
                <i class="fa-solid fa-bars text-lg"></i>
            </button>
            
            <div class="relative w-full max-w-2xl flex items-center">
                <i class="fa-solid fa-magnifying-glass absolute left-3 text-ghMuted text-sm"></i>
                <input type="text" id="search-input" placeholder="Pesquisar termo no banco de dados..." class="w-full pl-9 pr-4 py-1.5 bg-ghBg border border-ghBorder rounded-md text-sm text-ghText placeholder-ghMuted focus:outline-none focus:border-ghBlue focus:ring-1 focus:ring-ghBlue transition-all">
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="bg-[#010409] px-6 py-2 border-b border-ghBorder flex justify-between items-center text-[11px] font-mono text-ghMuted shrink-0">
            <span id="results-stats">Aguardando extração...</span>
            <span id="db-status" class="text-ghBlue"><i class="fa-solid fa-satellite-dish fa-fade mr-1"></i> Conectando...</span>
        </div>

        <!-- Área de Rolagem -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 scroll-smooth" id="scroll-area">
            <div class="max-w-4xl mx-auto">
                
                <!-- Terminal de Status (O Segredo da Nova Estratégia) -->
                <div id="terminal-container" class="bg-[#0d1117] border border-ghBorder rounded-lg p-4 font-mono text-[11px] sm:text-xs text-ghMuted mb-8 shadow-inner max-h-48 overflow-y-auto">
                    <div class="text-ghBlue mb-2"><i class="fa-solid fa-terminal mr-2"></i>GitHub Repositories Aggregator v1.0</div>
                    <div id="terminal-logs" class="space-y-1 terminal-blink"></div>
                </div>

                <div id="questions-container" class="space-y-6 pb-8">
                    <!-- Skeletons (Carregando) -->
                    <div class="animate-pulse bg-ghCard border border-ghBorder rounded-xl p-6">
                        <div class="h-4 bg-ghBorder rounded w-1/4 mb-6"></div>
                        <div class="h-3 bg-ghBorder rounded w-full mb-3"></div>
                        <div class="h-3 bg-ghBorder rounded w-5/6 mb-8"></div>
                        <div class="space-y-3">
                            <div class="h-10 bg-[#0d1117] rounded border border-ghBorder w-full"></div>
                            <div class="h-10 bg-[#0d1117] rounded border border-ghBorder w-full"></div>
                        </div>
                    </div>
                </div>
                
                <div id="pagination-container" class="pb-10"></div>
            </div>
        </div>
    </main>

    <!-- MOTOR DE DADOS DO SITE -->
    <script>
        const state = {
            questions: [],
            filteredQuestions: [],
            filters: { year: [], discipline:[], search: '' },
            currentPage: 1,
            itemsPerPage: 10,
            loading: true
        };

        // Repositórios Brutos (RAW) de NLP/IA - Garantia anti-bloqueio
        const GITHUB_SOURCES =[
            { repo: 'viniciusarruda/llm-enem', file: 'enem_2022_0_shot.json', url: 'https://raw.githubusercontent.com/viniciusarruda/llm-enem/main/dataset/enem/enem_2022_0_shot.json', year: 2022 },
            { repo: 'viniciusarruda/llm-enem', file: 'enem_2022_3_shot.json', url: 'https://raw.githubusercontent.com/viniciusarruda/llm-enem/main/dataset/enem/enem_2022_3_shot.json', year: 2022 },
            { repo: 'piresramon/gpt-4-enem', file: '2023.json', url: 'https://raw.githubusercontent.com/piresramon/gpt-4-enem/main/data/ENEM_2023.json', year: 2023 },
            // Fallback CDN Global caso a rede da empresa do usuário bloqueie o raw.githubusercontent.com
            { repo: 'jsdelivr/viniciusarruda', file: 'fallback.json', url: 'https://cdn.jsdelivr.net/gh/viniciusarruda/llm-enem@main/dataset/enem/enem_2022_0_shot.json', year: 2022 }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            setupUI();
            executeGitHubExtraction();
        });

        // ----------------------------------------------------------------
        // 1. EXTRAÇÃO DESCENTRALIZADA E NORMALIZAÇÃO (A Nova Estratégia)
        // ----------------------------------------------------------------
        function log(msg, type = 'info') {
            const logs = document.getElementById('terminal-logs');
            let color = 'text-ghMuted';
            if(type === 'success') color = 'text-[#3fb950]';
            if(type === 'error') color = 'text-[#f85149]';
            if(type === 'warn') color = 'text-[#d29922]';
            
            const line = document.createElement('div');
            line.className = color;
            line.innerHTML = `> ${msg}`;
            logs.appendChild(line);
            
            const container = document.getElementById('terminal-container');
            container.scrollTop = container.scrollHeight;
        }

        async function executeGitHubExtraction() {
            log('Iniciando pipeline de extração de dados brutos...');
            const allExtractedQuestions =[];
            const signatures = new Set(); // Para evitar duplicatas

            // Executa o fetch de todos os repositórios paralelamente
            const fetchPromises = GITHUB_SOURCES.map(async (src) => {
                log(`[GET] ${src.repo} -> ${src.file}...`);
                try {
                    const response = await fetch(src.url, { cache: 'no-store' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    log(`[SUCCESS] JSON decodificado de ${src.repo}`, 'success');
                    
                    const normalized = normalizeDataset(data, src.year);
                    log(`[PARSER] ${normalized.length} questões estruturadas de ${src.file}.`);
                    return normalized;

                } catch (err) {
                    log(`[SKIP] Falha ao acessar ${src.repo}/${src.file} (${err.message})`, 'warn');
                    return[];
                }
            });

            const results = await Promise.allSettled(fetchPromises);
            
            results.forEach(res => {
                if (res.status === 'fulfilled') {
                    res.value.forEach(q => {
                        // Cria uma assinatura única para a questão (evita repetição entre repositórios)
                        const sig = q.question.substring(0, 30).toLowerCase().replace(/[^a-z0-9]/g, '');
                        if (!signatures.has(sig) && q.alternatives.length > 0) {
                            signatures.add(sig);
                            allExtractedQuestions.push(q);
                        }
                    });
                }
            });

            state.loading = false;
            document.getElementById('terminal-logs').classList.remove('terminal-blink');

            if (allExtractedQuestions.length === 0) {
                log('[CRITICAL ERROR] Nenhum repositório respondeu. Seu provedor ou firewall corporativo está bloqueando o GitHub.', 'error');
                document.getElementById('db-status').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-ghRed"></i> Falha Total`;
            } else {
                log(`[COMPLETE] Banco de dados montado. Total: ${allExtractedQuestions.length} questões únicas.`, 'success');
                state.questions = allExtractedQuestions;
                state.filteredQuestions = [...allExtractedQuestions];
                
                document.getElementById('db-status').innerHTML = `<i class="fa-solid fa-check text-ghGreen"></i> Sistema Operante`;
                document.getElementById('db-status').classList.replace('text-ghBlue', 'text-ghGreen');
                
                setTimeout(() => {
                    document.getElementById('terminal-container').classList.add('hidden');
                }, 4000); // Esconde o terminal após 4s de sucesso para limpar a UI

                renderFilters();
                renderQuestions();
            }
        }

        // Função camaleão: Aceita quase qualquer formato JSON de IA e transforma no formato da UI
        function normalizeDataset(jsonData, defaultYear) {
            let extracted =[];
            // O dataset pode ser um Array direto ou um Objeto (ex: {"q1": {...}, "q2": {...}})
            let items = Array.isArray(jsonData) ? jsonData : Object.values(jsonData);
            
            // Tratamento caso venha envelopado
            if (!Array.isArray(items) && items.questions) items = items.questions;
            if (!Array.isArray(items) && items.data) items = items.data;

            if(!Array.isArray(items)) return[];

            items.forEach(item => {
                if(!item || typeof item !== 'object') return;
                
                let qText = item.question || item.enunciado || item.text || item.statement || '';
                if(typeof qText !== 'string' || qText.length < 10) return;
                
                let ctx = item.context || item.support_text || item.texto || item.intro || '';
                let alternatives =[];
                let correctFlag = item.answer ?? item.label ?? item.gabarito ?? item.correct;
                let correctLetter = null;

                if (typeof correctFlag === 'number') {
                    correctLetter = String.fromCharCode(65 + correctFlag);
                } else if (typeof correctFlag === 'string') {
                    correctLetter = correctFlag.trim().toUpperCase();
                }

                // Tenta extrair das chaves "A", "B", "C", "D", "E"
                ['A', 'B', 'C', 'D', 'E'].forEach((letter, idx) => {
                    let optText = item[letter] || item[letter.toLowerCase()];
                    if(optText) {
                        alternatives.push({
                            letter: letter,
                            text: optText,
                            isCorrect: (letter === correctLetter || correctFlag === idx)
                        });
                    }
                });

                // Se não encontrou, tenta procurar no array 'alternatives' ou 'options'
                if(alternatives.length === 0) {
                    const opts = item.alternatives || item.options ||[];
                    opts.forEach((opt, idx) => {
                        let l = String.fromCharCode(65 + idx);
                        let t = typeof opt === 'string' ? opt : (opt.text || opt.body || '');
                        alternatives.push({
                            letter: l,
                            text: t,
                            isCorrect: (l === correctLetter || correctFlag === idx || opt.isCorrect)
                        });
                    });
                }

                if(alternatives.length < 2) return;

                extracted.push({
                    id: `git-${Math.random().toString(36).substring(2,10)}`,
                    year: item.year || item.ano || defaultYear,
                    discipline: inferDiscipline(item.discipline || item.area, qText),
                    context: ctx,
                    question: qText,
                    alternatives: alternatives
                });
            });

            return extracted;
        }

        // Caso o dataset não especifique a matéria, inferimos pelo texto
        function inferDiscipline(rawDisc, text) {
            const raw = String(rawDisc || '').toLowerCase();
            const t = String(text || '').toLowerCase();
            
            if (raw.includes('natureza') || t.includes('biologia') || t.includes('física') || t.includes('química') || t.includes('energia')) return 'Ciências da Natureza';
            if (raw.includes('humana') || t.includes('história') || t.includes('geografia') || t.includes('filosofia') || t.includes('século')) return 'Ciências Humanas';
            if (raw.includes('linguagem') || t.includes('português') || t.includes('inglês') || t.includes('texto')) return 'Linguagens e Códigos';
            if (raw.includes('matemática') || raw.includes('math') || t.includes('matemática') || t.includes('função')) return 'Matemática';
            
            return 'Conhecimentos Gerais';
        }

        function getDisciplineColor(disc) {
            switch(disc) {
                case 'Ciências da Natureza': return 'text-[#3fb950] border-[#3fb950]/30 bg-[#3fb950]/10';
                case 'Ciências Humanas': return 'text-[#d29922] border-[#d29922]/30 bg-[#d29922]/10';
                case 'Linguagens e Códigos': return 'text-[#a371f7] border-[#a371f7]/30 bg-[#a371f7]/10';
                case 'Matemática': return 'text-[#58a6ff] border-[#58a6ff]/30 bg-[#58a6ff]/10';
                default: return 'text-ghMuted border-ghBorder bg-[#0d1117]';
            }
        }

        // ----------------------------------------------------------------
        // 2. LÓGICA DE INTERFACE (Filtros, Renderização, Paginação)
        // ----------------------------------------------------------------
        function setupUI() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            const toggle = () => {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            };

            document.getElementById('menu-toggle').addEventListener('click', toggle);
            document.getElementById('close-sidebar').addEventListener('click', toggle);
            overlay.addEventListener('click', toggle);

            document.getElementById('search-input').addEventListener('input', (e) => {
                state.filters.search = e.target.value.toLowerCase();
                state.currentPage = 1;
                applyFilters();
            });

            document.getElementById('clear-filters').addEventListener('click', () => {
                document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
                document.getElementById('search-input').value = '';
                state.filters = { year: [], discipline:[], search: '' };
                state.currentPage = 1;
                applyFilters();
            });
        }

        function renderFilters() {
            const years = new Set();
            const disciplines = new Set();

            state.questions.forEach(q => {
                years.add(q.year);
                disciplines.add(q.discipline);
            });

            document.getElementById('filter-years').innerHTML = Array.from(years).sort((a,b) => b-a).map(y => `
                <label class="flex items-center p-1.5 hover:bg-[#0d1117] rounded cursor-pointer group transition-colors">
                    <div class="relative flex items-center justify-center w-4 h-4 mr-3 border border-ghBorder rounded bg-ghBg group-hover:border-ghBlue transition-colors">
                        <input type="checkbox" value="${y}" class="filter-checkbox filter-year opacity-0 absolute w-full h-full cursor-pointer checkbox-custom">
                        <div class="w-full h-full rounded pointer-events-none flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-check text-white text-[9px] hidden"></i>
                        </div>
                    </div>
                    <span class="text-sm text-ghText group-hover:text-white transition-colors">${y}</span>
                </label>
            `).join('');

            document.getElementById('filter-disciplines').innerHTML = Array.from(disciplines).sort().map(d => `
                <label class="flex items-center p-1.5 hover:bg-[#0d1117] rounded cursor-pointer group transition-colors">
                    <div class="relative flex items-center justify-center w-4 h-4 mr-3 border border-ghBorder rounded bg-ghBg group-hover:border-ghBlue transition-colors">
                        <input type="checkbox" value="${d}" class="filter-checkbox filter-discipline opacity-0 absolute w-full h-full cursor-pointer checkbox-custom">
                        <div class="w-full h-full rounded pointer-events-none flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-check text-white text-[9px] hidden"></i>
                        </div>
                    </div>
                    <span class="text-sm text-ghText group-hover:text-white transition-colors line-clamp-1" title="${d}">${d}</span>
                </label>
            `).join('');

            document.querySelectorAll('.filter-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    const yearCbs = document.querySelectorAll('.filter-year:checked');
                    const discCbs = document.querySelectorAll('.filter-discipline:checked');
                    state.filters.year = Array.from(yearCbs).map(c => String(c.value));
                    state.filters.discipline = Array.from(discCbs).map(c => c.value);
                    state.currentPage = 1;
                    
                    const btn = document.getElementById('clear-filters');
                    (state.filters.year.length || state.filters.discipline.length || state.filters.search) 
                        ? btn.classList.remove('hidden') 
                        : btn.classList.add('hidden');
                        
                    applyFilters();
                });
            });
        }

        function applyFilters() {
            const s = state.filters.search;
            state.filteredQuestions = state.questions.filter(q => {
                const yMatch = !state.filters.year.length || state.filters.year.includes(String(q.year));
                const dMatch = !state.filters.discipline.length || state.filters.discipline.includes(q.discipline);
                const sMatch = !s || q.question.toLowerCase().includes(s) || q.context.toLowerCase().includes(s);
                return yMatch && dMatch && sMatch;
            });
            renderQuestions();
        }

        function formatText(text) {
            if (!text) return '';
            let t = String(text);
            if (t.includes('<p>') || t.includes('<br>')) return t; // Se já tiver html
            // Processa line breaks para HTML válido e escapa tags maliciosas
            return t.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br><span class="block mt-1"></span>');
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            const stats = document.getElementById('results-stats');

            if (state.filteredQuestions.length === 0 && !state.loading) {
                stats.innerText = '0 instâncias encontradas';
                container.innerHTML = `
                    <div class="border border-ghBorder border-dashed rounded-xl p-12 text-center text-ghMuted">
                        <i class="fa-solid fa-code-pull-request text-4xl mb-4 text-ghBorder"></i>
                        <h2 class="text-lg font-semibold text-ghText mb-1">Nenhum resultado</h2>
                        <p class="text-sm">Altere seus filtros para encontrar questões.</p>
                    </div>`;
                document.getElementById('pagination-container').innerHTML = '';
                return;
            }

            const total = state.filteredQuestions.length;
            const start = (state.currentPage - 1) * state.itemsPerPage;
            const end = start + state.itemsPerPage;
            const slice = state.filteredQuestions.slice(start, end);

            stats.innerHTML = `Mostrando <span class="text-white">${start + 1}-${Math.min(end, total)}</span> de <span class="text-white">${total}</span> issues`;

            container.innerHTML = slice.map(q => {
                const badgeStyle = getDisciplineColor(q.discipline);
                // Previne quebra caso a IA não tenha definido a resposta certa no JSON
                const fallback = q.alternatives.some(a=>a.isCorrect) ? false : true; 
                
                return `
                <div class="bg-ghCard border border-ghBorder rounded-xl p-6 sm:p-8 hover:border-ghMuted/50 transition-colors shadow-sm relative group" id="q-${q.id}">
                    <div class="flex flex-wrap gap-2 mb-5">
                        <span class="px-2.5 py-1 text-[10px] font-mono font-semibold uppercase tracking-wide border rounded-md ${badgeStyle}">
                            ${q.discipline}
                        </span>
                        <span class="px-2.5 py-1 text-[10px] font-mono font-semibold text-ghMuted border border-ghBorder bg-[#0d1117] rounded-md">
                            ENEM ${q.year}
                        </span>
                        <span class="ml-auto text-[10px] font-mono text-ghMuted/50 group-hover:text-ghMuted transition-colors pt-1">
                            #${q.id}
                        </span>
                    </div>
                    
                    <div class="mb-7 text-ghText text-[15px] sm:text-base leading-relaxed">
                        ${q.context ? `<div class="mb-4 text-ghMuted border-l-2 border-ghBorder pl-4 py-1 italic break-words">${formatText(q.context)}</div>` : ''}
                        <div class="font-medium break-words text-white">${formatText(q.question)}</div>
                    </div>
                    
                    <div class="space-y-2 mb-7">
                        ${q.alternatives.map((alt, i) => `
                            <label class="flex items-start p-3.5 rounded-lg border border-ghBorder bg-[#0d1117] hover:bg-[#1f242c] cursor-pointer transition-colors w-full ${(alt.isCorrect || (fallback && i===0)) ? 'correct-option' : 'wrong-option'}">
                                <div class="relative flex items-center justify-center w-5 h-5 mt-0.5 mr-4 border border-ghMuted rounded-full shrink-0">
                                    <input type="radio" name="r-${q.id}" value="${alt.letter}" class="github-radio opacity-0 absolute w-full h-full cursor-pointer">
                                    <div class="w-full h-full rounded-full pointer-events-none transition-colors flex items-center justify-center">
                                        <div class="w-2 h-2 rounded-full bg-white scale-0 transition-transform"></div>
                                    </div>
                                </div>
                                <div class="flex-1 text-sm leading-relaxed break-words">
                                    <span class="font-bold text-white mr-1 option-label">${alt.letter}.</span>
                                    <span class="text-ghText option-text">${formatText(alt.text)}</span>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                    
                    <div class="flex justify-start border-t border-ghBorder pt-5">
                        <button class="px-4 py-2 bg-[#21262d] hover:bg-[#30363d] border border-ghBorder text-ghText rounded-md font-semibold text-[13px] transition-colors flex items-center gap-2" onclick="revealAnswer('${q.id}', this)">
                            <i class="fa-regular fa-eye"></i> Revelar Gabarito
                        </button>
                    </div>
                </div>`;
            }).join('');

            // Adiciona CSS para o radio interno (o bolinho branco)
            const style = document.createElement('style');
            style.innerHTML = `.github-radio:checked + div > div { transform: scale(1); }`;
            container.appendChild(style);

            renderPagination();

            // Re-renderiza Fórmulas com o MathJax
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([container]).catch(err => console.log('MathJax:', err.message));
            }
        }

        window.revealAnswer = function(id, btn) {
            const container = document.getElementById(`q-${id}`);
            container.classList.add('show-results');
            
            container.querySelectorAll('input').forEach(r => r.disabled = true);
            
            const selected = container.querySelector('input[type="radio"]:checked');
            if (selected) {
                const label = selected.closest('label');
                if (!label.classList.contains('correct-option')) label.classList.add('wrong-selected');
            }
            
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Finalizado`;
            btn.className = "px-4 py-2 bg-[#238636] border border-[#2ea043] text-white rounded-md font-semibold text-[13px] flex items-center gap-2 cursor-default shadow-sm";
            btn.disabled = true;
        }

        function renderPagination() {
            const t = Math.ceil(state.filteredQuestions.length / state.itemsPerPage);
            const c = document.getElementById('pagination-container');
            if (t <= 1) return c.innerHTML = '';
            
            let h = `<div class="flex justify-center items-center gap-1.5 mt-2">`;
            
            const btnClass = "min-w-[32px] h-8 px-2 flex items-center justify-center rounded-md border border-ghBorder bg-ghBg text-ghText text-sm font-medium hover:bg-[#1f242c] transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
            const activeClass = "min-w-[32px] h-8 px-2 flex items-center justify-center rounded-md border border-ghBlue bg-ghBlue text-white text-sm font-medium shadow-sm";
            
            h += `<button onclick="goPage(${state.currentPage - 1})" ${state.currentPage === 1 ? 'disabled' : ''} class="${btnClass}"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>`;
            
            let start = Math.max(1, state.currentPage - 2);
            let end = Math.min(t, state.currentPage + 2);
            
            if (start > 1) {
                h += `<button onclick="goPage(1)" class="${btnClass}">1</button>`;
                if (start > 2) h += `<span class="px-1 text-ghMuted">...</span>`;
            }
            
            for (let i = start; i <= end; i++) {
                if (i === state.currentPage) h += `<button class="${activeClass}">${i}</button>`;
                else h += `<button onclick="goPage(${i})" class="${btnClass}">${i}</button>`;
            }
            
            if (end < t) {
                if (end < t - 1) h += `<span class="px-1 text-ghMuted">...</span>`;
                h += `<button onclick="goPage(${t})" class="${btnClass}">${t}</button>`;
            }
            
            h += `<button onclick="goPage(${state.currentPage + 1})" ${state.currentPage === t ? 'disabled' : ''} class="${btnClass}"><i class="fa-solid fa-chevron-right text-[10px]"></i></button></div>`;
            c.innerHTML = h;
        }

        window.goPage = function(p) {
            const t = Math.ceil(state.filteredQuestions.length / state.itemsPerPage);
            if (p < 1 || p > t) return;
            state.currentPage = p;
            renderQuestions();
            document.getElementById('scroll-area').scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
